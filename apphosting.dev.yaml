# apphosting.dev.yaml — dev environment overlay
# Auto-loaded by Firebase App Hosting when a backend's "Environment Name" is set to "dev"
# (Console: Backend → Settings → Environment). Merged on top of apphosting.yaml — only
# the variables that differ from prod need to be listed here.
# https://firebase.google.com/docs/app-hosting/multiple-environments

env:
  - variable: NEXTAUTH_URL
    value: https://admin-dev--triarch-dev-website.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: DEPLOY_WEBHOOK_URL
    value: https://admin-dev--triarch-dev-website.us-central1.hosted.app/api/webhooks/github-deploy
    availability:
      - RUNTIME

  - variable: DATABASE_URL
    secret: DATABASE_URL_DEV

  # Internal HMAC dispatch secret (Phase 22 — portal→admin HMAC-signed dispatch)
  # Dev environment uses the same INTERNAL_HMAC_SECRET from triarch-vault.
  - variable: INTERNAL_HMAC_SECRET
    secret: INTERNAL_HMAC_SECRET

  # CL-6 server-side adoption enforcement mode (Phase 27).
  # Dev backend also defaults to 'warn' - safe default during rollout.
  - variable: CL6_ENFORCEMENT_MODE
    value: warn
    availability:
      - RUNTIME

  # CL-2 dev chrome badge (Phase 29). NEXT_PUBLIC_* vars are baked into the
  # client bundle at build time, so BUILD availability is required.
  # Prod (apphosting.yaml) leaves this absent so the badge renders nothing.
  - variable: NEXT_PUBLIC_ENV
    value: dev
    availability:
      - BUILD
      - RUNTIME
