name: Publish @triarchsecurity/triarch-shared

on:
  push:
    tags:
      - 'shared/v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/triarch-shared
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 + GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@triarchsecurity'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/shared/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag 'shared/v$TAG_VERSION' does not match packages/triarch-shared/package.json version '$PKG_VERSION'"
            exit 1
          fi

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Summary
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          echo "## Published @triarchsecurity/triarch-shared@${PKG_VER}" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${GITHUB_REF#refs/tags/}" >> $GITHUB_STEP_SUMMARY
          echo "Registry: https://npm.pkg.github.com" >> $GITHUB_STEP_SUMMARY
