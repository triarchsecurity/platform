name: Triarch Dev CI/CD

on:
  push:
    branches:
      - main
      - dev
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  quality-gate:
    uses: triarchsecurity/shared-workflows/.github/workflows/quality-gate.yml@v7.1
    with:
      run_qa_tests: false
      run_pentest: false
      needs_server: false
    secrets: inherit

  flush-changelog:
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Flush changelog to triarch-dev
        env:
          TRIARCH_API_KEY: ${{ secrets.TRIARCH_API_KEY }}
          TRIARCH_API_URL: https://www.triarch.dev
        run: npx tsx scripts/triarch-ingest.ts flush-changelog
        continue-on-error: true

  validate-apphosting:
    # Phase 24 / CI-04 — pre-deploy lint of apphosting.yaml + apphosting.dev.yaml
    # against REQUIRED_ENV (src/lib/env-schema.ts). Fails the build on any missing
    # binding so env-name typos can't slip into a deploy and surface as a failed
    # rollout at FAH boot. Runs in parallel with quality-gate's other gates.
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
      - name: Install deps for validate script
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci
      - name: Validate apphosting.yaml against env schema
        run: npx tsx scripts/validate-apphosting.ts

  # Pick deploy environment from branch. admin/www's prod backend is named
  # `triarch-dev` (legacy) and the dev backend is `admin-dev` — does NOT
  # follow the v4 auto-suffix convention. v7+ `dev_backend` input handles this.
  env-select:
    needs: [quality-gate, validate-apphosting]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "env=dev" >> $GITHUB_OUTPUT
          else
            echo "env=prod" >> $GITHUB_OUTPUT
          fi

  # Layer 3 bypass-prevention: refuse to deploy to prod unless this commit
  # has already passed through dev. Hotfix escape: [hotfix-bypass-dev] in
  # commit message. See: https://www.triarch.dev/ci-cd/firebase-2env-pattern.md
  verify-dev-deployed:
    needs: env-select
    if: needs.env-select.outputs.environment == 'prod'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assert HEAD is on origin/dev (or carries hotfix-bypass token)
        run: |
          COMMIT_MSG=$(git log -1 --format=%B HEAD)
          if echo "$COMMIT_MSG" | grep -qF "[hotfix-bypass-dev]"; then
            echo "::warning::Bypassing dev-deployed check — commit message contains [hotfix-bypass-dev]."
            {
              echo "## ⚠️ Hotfix bypass used"
              echo ""
              echo "Commit \`$(git rev-parse HEAD)\` reached prod without passing through dev."
              echo "Commit subject: $(git log -1 --format=%s HEAD)"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git fetch origin dev
          if ! git merge-base --is-ancestor HEAD origin/dev; then
            echo "::error::Refusing to deploy to prod: $(git rev-parse HEAD) has not been deployed to dev yet."
            echo "::error::Merge this commit to dev first, verify it deploys cleanly, then promote to main."
            echo "::error::For genuine hotfixes, add [hotfix-bypass-dev] to the commit message (deliberate, traceable bypass)."
            exit 1
          fi
          echo "Verified: $(git rev-parse HEAD) is an ancestor of origin/dev — safe to promote to prod."

  # GitHub Environment binding — Layer 4 of bypass prevention via env branch
  # policy. Skipped for dev pushes. Currently no reviewer/timer (solo-dev org).
  gate-prod:
    needs: [env-select, verify-dev-deployed]
    if: needs.env-select.outputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - run: echo "Production deploy approved for admin/www."

  deploy:
    needs: [quality-gate, validate-apphosting, env-select, verify-dev-deployed, gate-prod]
    # 2026-05-14: `always() &&` prefix is REQUIRED. Without it, GitHub Actions
    # applies an implicit success() wrapper that skips the deploy job when ANY
    # `needs` is in non-success state — including legitimately-skipped jobs
    # like verify-dev-deployed and gate-prod on dev pushes. The explicit
    # success/skipped checks below were already there but had no effect because
    # the implicit success() ran first. always() removes the implicit wrapper.
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      needs.quality-gate.result == 'success' &&
      needs.validate-apphosting.result == 'success' &&
      needs.env-select.result == 'success' &&
      (needs.gate-prod.result == 'success' || needs.gate-prod.result == 'skipped') &&
      (needs.verify-dev-deployed.result == 'success' || needs.verify-dev-deployed.result == 'skipped')
    uses: triarchsecurity/shared-workflows/.github/workflows/deploy-firebase.yml@v8
    with:
      firebase_project_id: triarch-dev-website
      app_hosting_backend: triarch-dev
      # Dev backend is `admin-dev` — v4 auto-suffix would yield `triarch-dev-dev`
      # (doesn't exist). v7+ dev_backend input handles this case.
      dev_backend: admin-dev
      environment: ${{ needs.env-select.outputs.environment }}
      deploy_command: apphosting
    secrets: inherit

  notify:
    needs: [quality-gate, deploy]
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    uses: triarchsecurity/shared-workflows/.github/workflows/notify.yml@v1
    with:
      status: ${{ needs.deploy.result }}
      project_name: Triarch Dev
      version: ${{ needs.deploy.outputs.version }}
      wait_for_fah: true
      app_hosting_backend: triarch-dev
      firebase_project_id: triarch-dev-website
    secrets: inherit
