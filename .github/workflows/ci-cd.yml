name: Triarch Dev CI/CD

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  quality-gate:
    uses: triarchsecurity/shared-workflows/.github/workflows/quality-gate.yml@v1
    with:
      run_qa_tests: false
      run_pentest: false
      needs_server: false
    secrets: inherit

  flush-changelog:
    needs: quality-gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Flush changelog to triarch-dev
        env:
          TRIARCH_API_KEY: ${{ secrets.TRIARCH_API_KEY }}
          TRIARCH_API_URL: https://www.triarch.dev
        run: npx tsx scripts/triarch-ingest.ts flush-changelog
        continue-on-error: true

  validate-apphosting:
    # Phase 24 / CI-04 — pre-deploy lint of apphosting.yaml + apphosting.dev.yaml
    # against REQUIRED_ENV (src/lib/env-schema.ts). Fails the build on any missing
    # binding so env-name typos can't slip into a deploy and surface as a failed
    # rollout at FAH boot. Runs in parallel with quality-gate's other gates.
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
      - name: Install deps for validate script
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - name: Validate apphosting.yaml against env schema
        run: npx tsx scripts/validate-apphosting.ts

  deploy:
    needs: [quality-gate, validate-apphosting]
    if: github.event_name == 'push'
    uses: triarchsecurity/shared-workflows/.github/workflows/deploy-firebase.yml@v4
    with:
      firebase_project_id: triarch-dev-website
      app_hosting_backend: triarch-dev
      deploy_command: apphosting
    secrets: inherit

  notify:
    needs: [quality-gate, deploy]
    if: always() && github.event_name == 'push'
    uses: triarchsecurity/shared-workflows/.github/workflows/notify.yml@v1
    with:
      status: ${{ needs.deploy.result }}
      project_name: Triarch Dev
      version: ${{ needs.deploy.outputs.version }}
      wait_for_fah: true
      app_hosting_backend: triarch-dev
      firebase_project_id: triarch-dev-website
    secrets: inherit
