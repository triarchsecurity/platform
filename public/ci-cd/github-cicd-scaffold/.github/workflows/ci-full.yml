name: CI (full)

# Triarch SMB CI/CD framework — FULL variant.
# ===========================================
# Use this workflow ONLY when ALL of the following are true:
#   - Repo has `iac/**/*.tf` or `iac/**/*.tofu` OR `**/Dockerfile` OR `.threatmodel/`
#     (otherwise the IaC scanners and threat-model-drift job add no value)
#   - Repo has GitHub Advanced Security available (public repo on any plan,
#     OR a paid GHAS license — verify via `gh api .../code-scanning/default-setup`)
#
# If those aren't met, ship `ci-lite.yml` instead (the SMB default).
# `ci-lite.yml` has 4 unconditional scanner jobs and works on Free org private.
#
# This file uses a `detect` job (instead of job-level `if: hashFiles(...)`)
# to gate the conditional scanners. The earlier `if: hashFiles(...)` pattern
# triggered a GitHub Actions startup-failure bug when the matched paths didn't
# exist AND a downstream summary job listed the gated job in `needs:`.
# See FINDINGS-2026-05-10.md for the diagnostic story.
#
# IMPORTANT — GitHub Advanced Security (GHAS) note
# ------------------------------------------------
# The 4 scanner jobs below (semgrep, osv-scanner, checkov, tfsec) upload SARIF
# results to GitHub's Security tab via `github/codeql-action/upload-sarif@v3`.
# That step requires the `security-events: write` permission, which in turn
# requires GHAS on PRIVATE repos.
#
# As shipped, this workflow is FREE-PLAN-SAFE: scanner jobs declare permissions
# WITHOUT `security-events: write`, and the SARIF-upload steps are
# `continue-on-error: true`. Findings appear in workflow logs; the upload step
# silently no-ops on Free private repos (those repos lack GHAS, so GitHub
# rejects the workflow at scheduling otherwise — `jobs: []`, no log).
#
# When you purchase GHAS (or are on a public repo), un-comment the
# `security-events: write` line in each of the 4 scanner jobs and remove the
# `continue-on-error: true` from each upload-sarif step to get findings into
# the Security tab.
#
# (Public repos under Free already have GHAS — the security-events permission
# works as-is for them.)

on:
  pull_request:
    branches: [main]
  push:
    # Only fire on push to main (post-merge). Feature-branch + Dependabot pushes
    # are covered by pull_request above. Dependabot push events have a read-only
    # GITHUB_TOKEN that fails per-job permission requests on private repos and
    # surfaces as `jobs: []` startup failures.
    branches: [main]
  workflow_dispatch:

# Deny by default; jobs request what they need.
permissions: {}

# Auto-cancel previous runs on the same PR/branch
concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------- detect
  # Centralized detect job whose outputs gate the conditional scanners.
  # Replaces the earlier `if: hashFiles(...)` pattern at job level, which
  # triggered a GitHub Actions startup-failure bug when paths didn't exist
  # AND ci-passed listed the gated jobs in `needs:`.
  detect:
    name: detect
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_iac: ${{ steps.scan.outputs.has_iac }}
      has_dockerfile: ${{ steps.scan.outputs.has_dockerfile }}
      has_threatmodel: ${{ steps.scan.outputs.has_threatmodel }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        run: |
          if find iac -type f \( -name '*.tf' -o -name '*.tofu' \) 2>/dev/null | grep -q .; then
            echo "has_iac=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_iac=false" >> "$GITHUB_OUTPUT"
          fi
          if find . -name 'Dockerfile' -not -path './node_modules/*' -not -path './.git/*' 2>/dev/null | grep -q .; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -d ".threatmodel" ]; then
            echo "has_threatmodel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_threatmodel=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------- lint+test
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # threat-model drift needs history

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ---------------------------------------------------------------- semgrep
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      # security-events: write   # un-comment when GHAS is enabled (required for SARIF upload)
    container:
      # Pin to SHA before merge — replace tag with full commit SHA + comment.
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep diff scan (PR) / full scan (push)
        # SECURITY: env: + quoted var (avoid run-shell-injection per Semgrep).
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$GH_EVENT_NAME" == "pull_request" ]]; then
            semgrep ci \
              --config p/ci \
              --config p/owasp-top-ten \
              --config p/react \
              --config p/typescript \
              --config p/javascript \
              --config p/nodejs \
              --config p/secrets \
              --baseline-ref "origin/$GH_BASE_REF" \
              --sarif --output=semgrep.sarif || true
          else
            semgrep ci \
              --config p/ci \
              --config p/owasp-top-ten \
              --config p/react \
              --sarif --output=semgrep.sarif || true
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true   # remove once GHAS is enabled (see header note)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Fail on Critical / High
        run: |
          jq -e '.runs[].results[] | select(.level=="error")' semgrep.sarif >/dev/null && {
            echo "::error::Semgrep found Critical/High findings"; exit 1; } || echo "no Critical/High"

  # ---------------------------------------------------------------- osv-scanner
  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # security-events: write   # un-comment when GHAS is enabled
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV-Scanner
        # google/osv-scanner-action is a monorepo; sub-action lives in /osv-scanner-action.
        # v2 dropped --skip-git; SARIF output via --format=sarif --output=path.
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5   # TODO: pin to commit SHA
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv.sarif
            ./
        continue-on-error: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true   # remove once GHAS is enabled
        with:
          sarif_file: osv.sarif
          category: osv-scanner

      - name: Fail on Critical / High
        if: always()
        run: |
          if [[ -f osv.sarif ]] && jq -e '.runs[].results[] | select(.level=="error")' osv.sarif >/dev/null; then
            echo "::error::OSV-Scanner found Critical/High vulnerabilities"; exit 1
          fi

  # ---------------------------------------------------------------- gitleaks
  # Direct binary install (NOT gitleaks-action). The official Action requires a
  # paid license for ORG accounts. Direct binary has no license requirement.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (binary)
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: Run gitleaks
        # SECURITY: env: + quoted var pattern.
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
        run: |
          set +e
          if [[ "$GH_EVENT_NAME" == "pull_request" ]]; then
            gitleaks protect --source=. --redact --config=.gitleaks.toml \
              --log-opts="--no-merges origin/$GH_BASE_REF..HEAD" \
              --report-format=sarif --report-path=gitleaks.sarif
          else
            gitleaks detect --source=. --redact --config=.gitleaks.toml \
              --report-format=sarif --report-path=gitleaks.sarif
          fi
          rc=$?
          if [[ $rc -eq 1 ]]; then
            echo "::error::gitleaks found one or more secrets"; exit 1
          fi

      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true   # remove once GHAS is enabled
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  # ---------------------------------------------------------------- iac scans
  checkov:
    name: checkov
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # security-events: write   # un-comment when GHAS is enabled
    needs: detect
    if: needs.detect.outputs.has_iac == 'true' || needs.detect.outputs.has_dockerfile == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12.2949.0   # TODO: pin to commit SHA
        with:
          directory: .
          framework: terraform,dockerfile,kubernetes,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          quiet: true
          soft_fail: false

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true   # remove once GHAS is enabled
        with:
          sarif_file: checkov.sarif
          category: checkov

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # security-events: write   # un-comment when GHAS is enabled
    needs: detect
    if: needs.detect.outputs.has_iac == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4   # TODO: pin to commit SHA
        with:
          sarif_file: tfsec.sarif
          working_directory: iac

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true   # remove once GHAS is enabled
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  # ---------------------------------------------------------------- threat model drift
  threat-model-drift:
    name: threat-model-drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    needs: detect
    if: needs.detect.outputs.has_threatmodel == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect architectural changes
        id: detect
        # SECURITY: env: + quoted var pattern (avoid run-shell-injection).
        # github.event.pull_request.base.sha is a 40-char hex (low injection risk)
        # but Semgrep flags any github.event.* in shell — env-ize anyway.
        env:
          GH_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Heuristic: any change under src/ or iac/ requires the threat model to be touched.
          base="${GH_PR_BASE_SHA:-HEAD~1}"
          arch_changed=$(git diff --name-only "$base"...HEAD -- 'src/' 'iac/' 'docs/architecture/' | wc -l)
          tm_touched=$(git diff --name-only "$base"...HEAD -- '.threatmodel/' | wc -l)

          if [[ $arch_changed -gt 0 && $tm_touched -eq 0 ]]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "drift=false" >> "$GITHUB_OUTPUT"

      - name: Comment on PR if drift
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Threat-model drift detected.** Architectural files changed without updating `.threatmodel/`. Run `/tm-threats` (or `/tm-full`) in Claude Code, commit the result, and push again.'
            });

  # ---------------------------------------------------------------- summary
  ci-passed:
    name: ci-passed
    needs: [detect, lint-test, semgrep, osv-scanner, gitleaks, checkov, tfsec, threat-model-drift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required checks failed"; exit 1
          fi
          echo "All required checks passed."
