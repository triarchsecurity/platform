runConfig:
  runtime: nodejs22
  concurrency: 10
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2

env:
  - variable: NEXTAUTH_URL
    value: https://admin.triarch.dev
    availability:
      - BUILD
      - RUNTIME

  - variable: ADMIN_EMAIL
    secret: ADMIN_EMAIL
    availability:
      - RUNTIME

  # Public webhook endpoint — security depends on DEPLOY_WEBHOOK_SECRET HMAC
  # verification (not on URL secrecy). URL disclosure here is intentional and
  # low-risk; HMAC validation rejects unsigned/forged requests.
  - variable: DEPLOY_WEBHOOK_URL
    value: https://admin.triarch.dev/api/webhooks/github-deploy
    availability:
      - RUNTIME

  - variable: PORTAL_BASE_URL
    value: https://portal.triarch.dev
    availability:
      - RUNTIME

  # Secrets — set via: firebase apphosting:secrets:set <KEY>
  - variable: DATABASE_URL
    secret: DATABASE_URL

  - variable: NEXTAUTH_SECRET
    secret: NEXTAUTH_SECRET

  - variable: GOOGLE_CLIENT_ID
    secret: GOOGLE_CLIENT_ID

  - variable: GOOGLE_CLIENT_SECRET
    secret: GOOGLE_CLIENT_SECRET

  # Build-time GitHub Packages auth. .npmrc reads ${NODE_AUTH_TOKEN}; this
  # binds the existing GITHUB_PACKAGES_TOKEN secret under the name the
  # .npmrc expects, and exposes it during BUILD so `npm ci` can fetch
  # @myalterlego/* packages from npm.pkg.github.com.
  - variable: NODE_AUTH_TOKEN
    secret: GITHUB_PACKAGES_TOKEN
    availability:
      - BUILD

  - variable: DEPLOY_WEBHOOK_SECRET
    secret: DEPLOY_WEBHOOK_SECRET

  # Slack App secrets (Phase 3) — see .planning/phases/03-slack-interactive-approval/03-HUMAN-UAT.md
  # Set via: firebase apphosting:secrets:set <KEY>
  # SLACK_PAYLOAD_SECRET is self-generated: openssl rand -base64 32
  - variable: SLACK_BOT_TOKEN
    secret: SLACK_BOT_TOKEN

  - variable: SLACK_SIGNING_SECRET
    secret: SLACK_SIGNING_SECRET

  - variable: SLACK_PAYLOAD_SECRET
    secret: SLACK_PAYLOAD_SECRET

  - variable: SLACK_RELEASE_APPROVAL_CHANNEL
    value: "#release-approvals"
    availability:
      - RUNTIME

  # GitHub App secrets (Phase 4) - see .planning/phases/04-github-app-promotion/04-HUMAN-UAT.md
  # Set via: firebase apphosting:secrets:set <KEY>
  # GITHUB_APP_PRIVATE_KEY: paste entire PEM contents including BEGIN/END lines
  - variable: GITHUB_APP_ID
    secret: GITHUB_APP_ID

  - variable: GITHUB_APP_PRIVATE_KEY
    secret: GITHUB_APP_PRIVATE_KEY

  - variable: GITHUB_APP_INSTALLATION_ID
    secret: GITHUB_APP_INSTALLATION_ID

  # FAH rollout dispatcher (Phase 13 — branch preview swap)
  # JSON keyfile for release-promoter@triarch-vault.iam.gserviceaccount.com
  - variable: FAH_PROMOTER_SA_KEY
    secret: FAH_PROMOTER_SA_KEY

  # Internal HMAC dispatch secret (Phase 22 — portal→admin HMAC-signed dispatch)
  # Shared between admin and portal runtimes via same GCP secret in triarch-vault.
  - variable: INTERNAL_HMAC_SECRET
    secret: INTERNAL_HMAC_SECRET

  # CL-6 server-side adoption enforcement mode (Phase 27).
  # Values: 'off' | 'warn' | 'enforce'
  #   off     - gate check skipped entirely (rollback escape hatch)
  #   warn    - log violations + write audit row but DO NOT block release insert (safe ship default)
  #   enforce - return 409 on missing/mismatched gate verdict; do NOT insert release_logs row
  # Flip to 'enforce' MANUALLY after Phase 28 self-adopt verifies the round-trip
  # and a 7-day grace window passes (CONTEXT.md D-Rollout).
  - variable: CL6_ENFORCEMENT_MODE
    value: warn
    availability:
      - RUNTIME
